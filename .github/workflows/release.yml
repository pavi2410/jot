name: Jot Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: jot
            binary_suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: jot
            binary_suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: jot
            binary_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: jot.exe
            binary_suffix: ".exe"

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --locked -p jot --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "jot-${{ matrix.target }}${{ matrix.binary_suffix }}"

      - name: Codesign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - "jot-${{ matrix.target }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: jot-${{ matrix.target }}${{ matrix.binary_suffix }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create release archives and checksums
        working-directory: dist
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          for binary in jot-*; do
            if [[ "$binary" == *.exe ]]; then
              triple="${binary%.exe}"
              triple="${triple#jot-}"
              cp "$binary" jot.exe
              zip "jot-${version}-${triple}.zip" jot.exe
              rm jot.exe
            else
              triple="${binary#jot-}"
              chmod +x "$binary"
              cp "$binary" jot
              chmod 755 jot
              tar -czf "jot-${version}-${triple}.tar.gz" jot
              rm jot
            fi
          done
          sha256sum jot-"${version}"-* > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jot-*.tar.gz
            dist/jot-*.zip
            dist/SHA256SUMS
