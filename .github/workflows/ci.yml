name: Jot CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --locked --workspace --verbose

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --locked --workspace --verbose

  sample:
    needs: test
    name: "${{ matrix.sample.name }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        sample:
          - name: App sample
            path: samples/java-app
          - name: Library sample
            path: samples/java-lib
            has_bench: true
          - name: Webserver sample
            path: samples/java-web
          - name: Workspace sample
            path: samples/java-workspace
          - name: Kotlin app sample
            path: samples/kotlin-app
          - name: Java+Kotlin sample
            path: samples/java-kotlin
        include:
          - os: ubuntu-latest
            binary: target/debug/jot
          - os: windows-latest
            binary: target/debug/jot.exe

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build jot CLI
        run: cargo build --locked -p jot --verbose
      - name: Build sample
        working-directory: ${{ matrix.sample.path }}
        run: ${{ github.workspace }}/${{ matrix.binary }} build
      - name: Test sample
        working-directory: ${{ matrix.sample.path }}
        run: ${{ github.workspace }}/${{ matrix.binary }} test
      - name: Bench sample
        if: matrix.sample.has_bench
        working-directory: ${{ matrix.sample.path }}
        run: ${{ github.workspace }}/${{ matrix.binary }} bench
