name: Jot CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --locked --workspace --verbose

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --locked --workspace --verbose

  sample:
    needs: test
    name: "${{ matrix.sample.name }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        sample:
          - name: CLI sample
            path: samples/java/cli
          - name: Library sample
            path: samples/java/library
          - name: Minimal app sample
            path: samples/java/minimal-app
          - name: Multi-module workspace sample
            path: samples/java/multi-module-workspace
          - name: Webserver sample
            path: samples/java/webserver
          - name: Kotlin minimal app sample
            path: samples/kotlin/minimal-app
          - name: Mixed Java+Kotlin sample
            path: samples/kotlin/mixed-java-kotlin
        include:
          - os: ubuntu-latest
            binary: target/debug/jot
          - os: windows-latest
            binary: target/debug/jot.exe

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build jot CLI
        run: cargo build --locked -p jot --verbose
      - name: Build sample
        working-directory: ${{ matrix.sample.path }}
        run: ${{ github.workspace }}/${{ matrix.binary }} build
      - name: Test sample
        working-directory: ${{ matrix.sample.path }}
        run: ${{ github.workspace }}/${{ matrix.binary }} test
